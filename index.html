<!DOCTYPE html>
<html lang="PT-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="shortcut icon" href="./assets/mcdonalds.png" type="image/x-icon">
    <title>McDonald's</title>
</head>

<body>
    <main>
        <div class="logo">
            <img src="./assets/mcdonalds.png" alt="">
            <h1>McDonald's</h1>
            <p>Bem-vindo! Selecione o tipo de acesso</p>
        </div>

        <div class="tipo-de-acesso">
            <a href="./pages/logincliente/logincliente.html" class="cliente">
                <div>
                    <div>
                        <img src="./assets/user.png" alt="Usuario" class="userpreto">
                        <img src="./assets/user_branco.png" alt="Usuario" class="userbranco">
                    </div>

                    <h2>Cliente</h2>
                    <p>Faça seus pedidos e aproveite nossas ofertas</p>
                </div>
            </a>

            <a href="./pages/logingarcom/logingarcom.html" class="garcom">
                <div>
                    <div>
                        <img src="./assets/chef.png" alt="Garçom" class="chefpreto">
                        <img src="./assets/chef_branco.png" alt="Garçom" class="chefbranco">
                    </div>
                    <h2>Garçom</h2>
                    <p>Gerencie pedidos e atenda clientes</p>
                </div>
            </a>

        </div>
    </main>

    <p>© 2026 McDonald's. Todos os direitos reservados.</p>
</body>

</html>
